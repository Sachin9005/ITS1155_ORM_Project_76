# Hibernate Configuration (property file - as required by coursework)

# Database Connection - UPDATE THESE IF YOUR SETUP DIFFERS
hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/serenity_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
hibernate.connection.username=root
hibernate.connection.password=mysql

# Hibernate Dialect (Commented out: Hibernate 6 auto-detects this correctly for MySQL 8+)
# hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Schema Auto-generation (create-drop for dev, update for prod)
hibernate.hbm2ddl.auto=update
# Show SQL in console
hibernate.show_sql=false
hibernate.format_sql=true
# Connection Pool (C3P0)
hibernate.connection.pool_size=10
# Second-Level Cache (disabled for simplicity; enable with EhCache for prod)
hibernate.cache.use_second_level_cache=false
# Statistics
hibernate.generate_statistics=false
